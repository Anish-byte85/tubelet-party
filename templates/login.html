{% extends "base.html" %}
{% block title %}Sign in — Tubelet Party{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="logo">
      <span class="brand-mark"></span>
      <span style="font-weight:800;font-size:20px">Tubelet <small style="color:var(--muted);font-weight:500;font-size:12px;letter-spacing:1px;text-transform:uppercase">Party</small></span>
    </div>
    <h1>Welcome back 👋</h1>
    <p class="sub">Sign in to join the party.</p>
    <form method="post">
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
      <div class="field">
        <label>Username or email</label>
        <input name="identifier" required autofocus autocomplete="username" autocapitalize="none">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%">Sign in</button>
    </form>
    <p style="margin-top:20px;color:var(--muted);font-size:14px;text-align:center">
      New here? <a class="link" href="{{ url_for('register', next=next) }}">Create an account</a>
    </p>
  </div>
</div>
{% endblock %}
